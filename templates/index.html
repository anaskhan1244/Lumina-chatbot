<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina - Your Ultra-Fast AI Companion</title>
    
    <!-- Tailwind CSS for utility spacing -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Highlight.js for code -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="transition-colors duration-300">
    <div class="mesh-gradient"></div>
    
    <div class="flex flex-col h-screen max-h-screen relative z-10">
        <!-- Premium Header -->
        <header class="py-4 px-8 flex justify-between items-center backdrop-blur-md border-b border-white/10 dark:border-white/5">
            <div class="flex items-center group cursor-pointer" onclick="location.reload()">
                <div class="flex flex-col">
                    <h1 class="logo-text leading-none">Lumina</h1>
                    <span class="text-[10px] font-bold text-gray-400 tracking-[0.2em] uppercase mt-1">AI Assistant</span>
                </div>
            </div>
            
            <div class="flex items-center space-x-6">
                <!-- Subject-Based Persona Selector -->
                <div class="hidden md:block relative">
                    <select id="persona-selector" class="appearance-none bg-white/50 dark:bg-black/50 backdrop-blur-md border border-gray-200 dark:border-gray-800 rounded-lg py-2 px-4 pr-10 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-xs font-bold uppercase tracking-widest text-gray-600 dark:text-gray-300 transition-all cursor-pointer">
                        <option value="stem">Science, Tech, Eng, & Math (STEM)</option>
                        <option value="coding">Software Coding</option>
                        <option value="business">Business & Economics</option>
                        <option value="language">Language & Arts</option>
                        <option value="general">General Learning</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-400">
                        <i class="fas fa-chevron-down text-[10px]"></i>
                    </div>
                </div>

                <!-- Theme Toggle -->
                <button id="theme-toggle" class="w-10 h-10 rounded-full flex items-center justify-center bg-white/50 dark:bg-black/50 hover:scale-110 transition-transform">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block text-yellow-400"></i>
                </button>
                
                <button id="clear-chat-btn" class="text-sm font-semibold text-gray-500 hover:text-red-500 transition-colors">
                    <i class="fas fa-trash-alt mr-2"></i>Reset
                </button>
            </div>
        </header>

        <!-- Main Workspace -->
        <main class="flex-1 overflow-y-auto p-6 md:p-8" id="chat-container">
            <!-- Hero Section -->
            <div class="welcome-container max-w-4xl mx-auto mt-12 mb-12 fade-in">
                <div class="text-center mb-12">
                    <h2 class="text-4xl md:text-5xl font-bold mb-4 bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-400 bg-clip-text text-transparent">Illuminate Your Learning.</h2>
                    <p class="text-lg text-gray-500 dark:text-gray-400">Experience the next generation of academic intelligence. Fast, precise, and personalized.</p>
                </div>

                <!-- Persona Grid (Salesperson Style) -->
                <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-12" id="persona-grid">
                    <div class="persona-card glass-container p-4 text-center cursor-pointer transition-all hover:-translate-y-1 active:scale-95 ring-2 ring-indigo-500 bg-indigo-50 dark:bg-indigo-900/40" data-persona="stem">
                        <div class="w-12 h-12 bg-blue-100 dark:bg-blue-900/30 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i class="fas fa-atom"></i>
                        </div>
                        <span class="text-[10px] font-bold uppercase tracking-wider">Science, Tech, Engineering & Math</span>
                    </div>
                    <div class="persona-card glass-container p-4 text-center cursor-pointer transition-all hover:-translate-y-1 active:scale-95" data-persona="coding">
                        <div class="w-12 h-12 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i class="fas fa-code"></i>
                        </div>
                        <span class="text-[10px] font-bold uppercase tracking-wider">Coding</span>
                    </div>
                    <div class="persona-card glass-container p-4 text-center cursor-pointer transition-all hover:-translate-y-1 active:scale-95" data-persona="business">
                        <div class="w-12 h-12 bg-orange-100 dark:bg-orange-900/30 text-orange-600 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i class="fas fa-chart-line"></i>
                        </div>
                        <span class="text-[10px] font-bold uppercase tracking-wider">Business</span>
                    </div>
                    <div class="persona-card glass-container p-4 text-center cursor-pointer transition-all hover:-translate-y-1 active:scale-95" data-persona="language">
                        <div class="w-12 h-12 bg-purple-100 dark:bg-purple-900/30 text-purple-600 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i class="fas fa-pen-nib"></i>
                        </div>
                        <span class="text-[10px] font-bold uppercase tracking-wider">Arts</span>
                    </div>
                    <div class="persona-card glass-container p-4 text-center cursor-pointer transition-all hover:-translate-y-1 active:scale-95" data-persona="general">
                        <div class="w-12 h-12 bg-gray-100 dark:bg-gray-700/30 text-gray-600 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i class="fas fa-graduation-cap"></i>
                        </div>
                        <span class="text-[10px] font-bold uppercase tracking-wider">General</span>
                    </div>
                </div>
            </div>

            <!-- Chat Grid -->
            <div id="messages-container" class="max-w-4xl mx-auto space-y-8"></div>
        </main>

        <!-- Dynamic Action Bar -->
        <div class="max-w-4xl mx-auto w-full px-4 mb-6">
            <!-- Quick Actions Row -->
            <div class="flex flex-wrap gap-2 mb-4 justify-center md:justify-start">
                <button id="summarize-btn" class="px-3 py-1.5 glass-container text-[10px] font-bold uppercase tracking-wider text-gray-500 hover:text-indigo-500 hover:border-indigo-500/50 transition-all">
                    <i class="fas fa-compress-alt mr-1"></i> Summarize
                </button>
                <button id="simplify-btn" class="px-3 py-1.5 glass-container text-[10px] font-bold uppercase tracking-wider text-gray-500 hover:text-indigo-500 hover:border-indigo-500/50 transition-all">
                    <i class="fas fa-child mr-1"></i> Simplify
                </button>
                <button id="elaborate-btn" class="px-3 py-1.5 glass-container text-[10px] font-bold uppercase tracking-wider text-gray-500 hover:text-indigo-500 hover:border-indigo-500/50 transition-all">
                    <i class="fas fa-expand-alt mr-1"></i> Elaborate
                </button>
                <button id="examples-btn" class="px-3 py-1.5 glass-container text-[10px] font-bold uppercase tracking-wider text-gray-500 hover:text-indigo-500 hover:border-indigo-500/50 transition-all">
                    <i class="fas fa-list-ul mr-1"></i> Examples
                </button>
            </div>

            <div id="suggestions-container" class="hidden mb-4 flex flex-wrap gap-2 justify-center fade-in">
                <!-- suggestions will pop up here as chips -->
            </div>

            <div class="glass-container p-2 shadow-2xl relative">
                <!-- Recording Indicator -->
                <div id="recording-indicator" class="hidden absolute inset-0 bg-white/80 dark:bg-gray-900/80 flex items-center justify-center z-50 rounded-2xl backdrop-blur-sm pointer-events-none">
                    <div class="flex items-center gap-3 text-indigo-600 dark:text-indigo-400 font-bold">
                        <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(239,68,68,0.5)]"></div> 
                        <span class="tracking-widest uppercase text-xs">Click "STOP" after speaking</span>
                    </div>
                </div>

                <form id="chat-form" class="flex items-center gap-2">
                    <button type="button" id="voice-input-btn" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-400 hover:text-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-all">
                        <i class="fas fa-microphone"></i>
                    </button>
                    
                    <textarea 
                        id="user-input" 
                        rows="1" 
                        placeholder="Type a message or use voice..." 
                        class="flex-1 bg-transparent border-none focus:ring-0 py-3 text-lg resize-none dark:text-white"
                    ></textarea>

                    <button type="submit" id="send-btn" class="w-12 h-12 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl shadow-lg shadow-indigo-600/30 flex items-center justify-center transition-all disabled:opacity-50">
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </form>
            </div>
            
            <div class="flex justify-between mt-3 px-2 items-center">
                <div class="flex gap-4 text-[10px] font-bold tracking-widest uppercase text-gray-400">
                    <span id="openrouter-status"><i class="fas fa-circle text-emerald-500 mr-1 scale-75"></i> AI Core Active</span>
                    <span id="whisper-status"><i class="fas fa-circle text-emerald-500 mr-1 scale-75"></i> Voice Engine Ready</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden Template Logic -->
    <template id="user-message-template">
        <div class="flex justify-end fade-in">
            <div class="user-bubble max-w-[85%]">
                <p class="text-[16px] leading-relaxed"></p>
            </div>
        </div>
    </template>

    <template id="bot-message-template">
        <div class="flex justify-start fade-in">
            <div class="bot-bubble max-w-[90%] shadow-sm">
                <div class="bot-content prose dark:prose-invert max-w-none text-[16px] leading-relaxed"></div>
                <div class="flex gap-3 mt-4 pt-3 border-t border-gray-50 dark:border-gray-800">
                    <button class="copy-btn text-xs text-gray-400 hover:text-indigo-500"><i class="fas fa-copy"></i></button>
                    <button class="retry-btn text-xs text-gray-400 hover:text-indigo-500"><i class="fas fa-redo-alt"></i></button>
                </div>
            </div>
        </div>
    </template>

    <template id="typing-indicator-template">
        <div class="flex justify-start fade-in">
            <div class="bot-bubble px-6 py-4">
                <div class="flex space-x-1.5">
                    <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce"></div>
                    <div class="w-2 h-2 bg-indigo-500 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                    <div class="w-2 h-2 bg-indigo-600 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                </div>
            </div>
        </div>
    </template>

    <!-- JS Files -->
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/voice.js') }}"></script>
</body>
</html>
